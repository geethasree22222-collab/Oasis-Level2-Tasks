<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --panel: #0c1526;
      --border: #1a3a6a;
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --accent3: #7fff6b;
      --text: #e0f0ff;
      --muted: #5a7a99;
      --glow: 0 0 20px rgba(0,200,255,0.4);
      --glow2: 0 0 20px rgba(255,107,53,0.4);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 520px;
      width: 100%;
    }

    .back {
      text-align: center;
      margin-bottom: 16px;
    }

    .back a {
      color: var(--accent);
      font-family: Orbitron, monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-decoration: none;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-family: Orbitron, monospace;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #000;
      color: white;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      font-family: Orbitron, monospace;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- BACK LINK -->
  <div class="back">
    <a href="index.html">← BACK TO HOME</a>
  </div>

  <div class="card">
    <h1>Temperature Converter</h1>

    <input type="number" id="temp" placeholder="Enter Celsius" />

    <button onclick="convert()">CONVERT</button>

    <div class="result" id="result"></div>
  </div>

</div>

<script>
  function convert() {
    const c = document.getElementById("temp").value;
    if (c === "") {
      document.getElementById("result").innerText = "Enter a value";
      return;
    }
    const f = (c * 9/5) + 32;
    document.getElementById("result").innerText =
      c + "°C = " + f.toFixed(2) + "°F";
  }
</script>

</body>
</html>
