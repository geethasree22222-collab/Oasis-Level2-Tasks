<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --panel: #0c1526;
      --border: #1a3a6a;
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --accent3: #7fff6b;
      --text: #e0f0ff;
      --muted: #5a7a99;
      --glow: 0 0 20px rgba(0,200,255,0.4);
      --glow2: 0 0 20px rgba(255,107,53,0.4);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }
  </style>
</head>

<body>

<!-- ✅ ONLY ADDED CODE -->
<a href="../index.html" style="position:fixed;top:15px;left:15px;color:#00c8ff;text-decoration:none;z-index:999;">
  ← Back to Home
</a>
<!-- ✅ END -->

<div class="container">
  <div class="header">
    <div class="label">OASIS INFOBYTE — Level 1 Task</div>
    <h1>TEMP<br>CONVERTER</h1>
    <div class="subtitle">CELSIUS · FAHRENHEIT · KELVIN</div>
  </div>

  <div class="card">
    <div class="thermo-icon">🌡️</div>

    <div class="input-group">
      <label>Enter Temperature</label>
      <input type="number" id="tempInput" placeholder="e.g. 100" />
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="unit-options">
      <button class="unit-btn active" data-unit="C" onclick="selectUnit(this)">°C</button>
      <button class="unit-btn" data-unit="F" onclick="selectUnit(this)">°F</button>
      <button class="unit-btn" data-unit="K" onclick="selectUnit(this)">K</button>
    </div>

    <button class="convert-btn" onclick="convert()">⚡ CONVERT</button>

    <div class="result-section" id="resultSection">
      <div class="result-cards">
        <div class="result-card"><div id="val-C">—</div>°C</div>
        <div class="result-card"><div id="val-F">—</div>°F</div>
        <div class="result-card"><div id="val-K">—</div>K</div>
      </div>
    </div>
  </div>
</div>

<script>
  let selectedUnit = 'C';

  function selectUnit(btn) {
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedUnit = btn.dataset.unit;
  }

  function convert() {
    const v = parseFloat(document.getElementById('tempInput').value);
    if (isNaN(v)) return;

    let C, F, K;
    if (selectedUnit === 'C') {
      C = v;
      F = v * 9/5 + 32;
      K = v + 273.15;
    } else if (selectedUnit === 'F') {
      C = (v - 32) * 5/9;
      F = v;
      K = C + 273.15;
    } else {
      K = v;
      C = v - 273.15;
      F = C * 9/5 + 32;
    }

    document.getElementById('val-C').textContent = C.toFixed(2);
    document.getElementById('val-F').textContent = F.toFixed(2);
    document.getElementById('val-K').textContent = K.toFixed(2);
    document.getElementById('resultSection').classList.add('show');
  }
</script>

</body>
</html>
