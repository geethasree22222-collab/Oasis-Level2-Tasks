<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --panel: #0c1526;
      --border: #1a3a6a;
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --accent3: #7fff6b;
      --text: #e0f0ff;
      --muted: #5a7a99;
      --glow: 0 0 20px rgba(0,200,255,0.4);
      --glow2: 0 0 20px rgba(255,107,53,0.4);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 32px;
      color: var(--accent);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
    }

    label {
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--accent);
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: white;
      margin-bottom: 16px;
    }

    .units {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .unit-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Orbitron', monospace;
      cursor: pointer;
    }

    .unit-btn.active {
      background: rgba(0,200,255,0.15);
      color: white;
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .convert-btn {
      width: 100%;
      padding: 14px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #0080cc);
      cursor: pointer;
      margin-bottom: 20px;
    }

    .result {
      text-align: center;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result p {
      margin: 8px 0;
      font-size: 18px;
    }

    .back {
      margin-top: 15px;
      display: block;
      text-align: center;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<a href="index.html" class="back">← Back to Home</a>

<div class="container">
  <div class="header">
    <h1>Temperature Converter</h1>
  </div>

  <div class="card">
    <label>Enter Temperature</label>
    <input type="number" id="tempInput" placeholder="Enter value">

    <div class="units">
      <button class="unit-btn active" onclick="setUnit('C', this)">°C</button>
      <button class="unit-btn" onclick="setUnit('F', this)">°F</button>
      <button class="unit-btn" onclick="setUnit('K', this)">K</button>
    </div>

    <button class="convert-btn" onclick="convert()">Convert</button>

    <div class="result" id="result">
      <p id="celsius"></p>
      <p id="fahrenheit"></p>
      <p id="kelvin"></p>
    </div>
  </div>
</div>

<script>
  let unit = 'C';

  function setUnit(u, btn) {
    unit = u;
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function convert() {
    const value = parseFloat(document.getElementById('tempInput').value);
    if (isNaN(value)) return;

    let C, F, K;

    if (unit === 'C') {
      C = value;
      F = (C * 9/5) + 32;
      K = C + 273.15;
    } else if (unit === 'F') {
      F = value;
      C = (F - 32) * 5/9;
      K = C + 273.15;
    } else {
      K = value;
      C = K - 273.15;
      F = (C * 9/5) + 32;
    }

    document.getElementById('celsius').textContent = `Celsius: ${C.toFixed(2)} °C`;
    document.getElementById('fahrenheit').textContent = `Fahrenheit: ${F.toFixed(2)} °F`;
    document.getElementById('kelvin').textContent = `Kelvin: ${K.toFixed(2)} K`;

    document.getElementById('result').classList.add('show');
  }
</script>

</body>
</html>
